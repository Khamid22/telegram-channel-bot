services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: vocabulary_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vocabulary_bot"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/vocabulary_bot
      ADMIN_HOST: 0.0.0.0
      ADMIN_PORT: 5000
    volumes:
      - ../assets:/app/assets
      - ../credentials.json:/app/credentials.json:ro
    ports:
      - "5050:5000"
    command: ["python", "main.py", "all"]

volumes:
  postgres_data:
